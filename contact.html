<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="" />
    <title>Contact Us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <meta name="theme-color" content="#712cf9" />
    <link href="css/headers.css" rel="stylesheet" />
    <style>

    </style>
</head>

<body>
    <div id="header-bootstrap-example"></div>







    <div class="container px-4 text-center">
        <div class="row gx-2 ">
            <div class="col-4 mx-auto">
                <div class="row">
                    <h3>Contact Us</h3>
                </div>
                <div class="row">
                    <ul class="list-group">
                        <li class="list-group-item">Address: Silent Road #01-99</li>
                        <li class="list-group-item">Contact Number: 6123 456</li>
                        <li class="list-group-item">Email: contact@silentlibrary.com</li>
                    </ul>
                </div>
            </div>
            <div class="col-8 w-25 mx-auto ">
                <form>
                    <div class="mb-3">
                        <label for="exampleInputEmail1" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                        <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
                    </div>
                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" class="form-control" id="nameinput">
                    </div>

                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
            </div>
        </div>
    </div>




    <div class="container" id="footer-bootstrap-example"></div>


    <script>
        fetch('/header.html')                          // path relative to your site root
            .then(response => response.text())           // parse the response as plain text/HTML
            .then(html => {
                document.getElementById('header-bootstrap-example').innerHTML = html;
            })
            .catch(err => console.error('Header failed to load:', err));
        fetch('/footer.html')                          // path relative to your site root
            .then(response => response.text())           // parse the response as plain text/HTML
            .then(html => {
                document.getElementById('footer-bootstrap-example').innerHTML = html;
            })
            .catch(err => console.error('Footer failed to load:', err));
    </script>
</body>

</html>
